<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenAI</title>
    <style>
        #sidebar { width: 260px; background: #171717; padding: 20px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid #333; }
        .new-chat { border: 1px solid #4d4d4d; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 20px; font-size: 0.9rem; }
        .sidebar-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #ececf1; }
        .sidebar-item:hover { background: #2b2c2f; }
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; position: relative; height: 100vh; }
        #chat-container { width: 100%; max-width: 800px; flex-grow: 1; overflow-y: auto; padding: 40px 20px 150px 20px; box-sizing: border-box; }
        #welcome { text-align: center; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); }
        .logo { width: 120px; height: auto; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        h1 { font-size: 2rem; color: #f9f9f9; margin: 0; }
        .input-wrapper { position: absolute; bottom: 0; width: 100%; max-width: 800px; padding: 20px 20px 40px 20px; box-sizing: border-box; }
        .input-box { background: #2f2f2f; border: 1px solid #4d4d4d; border-radius: 20px; display: flex; padding: 8px 16px; align-items: center; }
        input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 12px; }
        button { background: #00ff88; color: #000; border: none; border-radius: 10px; padding: 10px 18px; font-weight: bold; cursor: pointer; }
        .msg { margin-bottom: 35px; line-height: 1.5; }
        .ai-label { color: #00ff88; font-weight: bold; display: block; margin-bottom: 5px; }
        .user-label { color: #aaa; font-weight: bold; display: block; margin-bottom: 5px; }

        body { 
            font-family: 'Comfortaa', cursive; 
            background: #212121; 
            color: white; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .brand-text {
            font-family: 'Comfortaa', cursive;
            font-size: 1.2rem;
            font-weight: 700; /* Bolder weight for the brand name */
            color: #00ff88;
            cursor: pointer;
        }
        
        input, button, .msg {
            font-family: 'Comfortaa', cursive;
        }
        
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent; /* Keeps your existing background visible */
            z-index: 10;
        }
        
        .version-tag {
            color: #888;
            font-size: 0.9rem;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-chat" onclick="location.reload()">+ New Chat</div>
        <div class="sidebar-item">Search chats</div>
        <div class="sidebar-item">Codex</div>
        <div style="margin-top: auto;" class="sidebar-item">Arad D</div>
    </div>

    <div id="main">
        <div id="top-bar">
            <span class="brand-text">GreenAI</span>
            <span class="version-tag">Llama 3.1</span>
        </div>
    
        <div id="welcome">
            <img src="https://dig.watch" alt="Logo" class="logo">
            <h1>What are you working on?</h1>
        </div>
    
        <div id="chat-container"></div>

        <div class="input-wrapper">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message GreenAI..." autocomplete="off">
                <button id="sendBtn" onclick="askAI()">Send</button>
                <!-- The Stop button (hidden by default) -->
                <button id="stopBtn" onclick="stopAI()" style="display:none; background: #ff4d4d; margin-left: 8px;">Stop</button>
            </div>
        </div>
        
        <style>
            button:disabled { background: #555; cursor: not-allowed; color: #888; }
        </style>

    </div>

<script>
    const BACKEND_URL = "https://green-ai-backend.vercel.app/api/chat";
    
    let controller;
    let typingQueue = []; // Buffer to hold incoming text
    let typingInterval = null;
    
    async function askAI() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-container');
        const welcome = document.getElementById('welcome');
        const btn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        if (!input.value.trim()) return;
    
        if(welcome) welcome.style.display = "none";
        btn.style.display = "none";
        stopBtn.style.display = "block";
    
        const userText = input.value;
        input.value = "";
        typingQueue = []; // Reset queue for new message
    
        chatBox.innerHTML += `<div class="msg"><span class="user-label">You</span>${userText}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    
        const aiDiv = document.createElement('div');
        aiDiv.className = 'msg';
        aiDiv.innerHTML = `<span class="ai-label">GreenAI</span><span class="ai-content"></span>`;
        chatBox.appendChild(aiDiv);
        const contentSpan = aiDiv.querySelector('.ai-content');
    
        // --- START TYPEWRITER ANIMATION ---
        typingInterval = setInterval(() => {
            if (typingQueue.length > 0) {
                const char = typingQueue.shift();
                contentSpan.innerHTML += char;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }, 15); // Adjust this number (ms) to change typing speed
    
        controller = new AbortController();
        
        try {
            const response = await fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                signal: controller.signal,
                body: JSON.stringify({ messages: [{role: "user", content: userText}] })
            });
    
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
    
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
    
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.trim() === '' || line.includes('[DONE]')) continue;
                    if (line.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(line.replace('data: ', ''));
                            const content = json.choices[0].delta.content;
                            if (content) {
                                // Push each character into the queue
                                typingQueue.push(...content.split(''));
                            }
                        } catch (e) { /* ignore partial JSON */ }
                    }
                }
            }
        } catch (error) {
            if (error.name === 'AbortError') {
                typingQueue = []; // Clear queue so typing stops
                contentSpan.innerHTML += " <i>(Stopped)</i>";
            } else {
                console.error(error);
            }
        } finally {
            // Wait for queue to empty before hiding stop button, or just reset
            checkIfFinished();
        }
    
        function checkIfFinished() {
            const check = setInterval(() => {
                if (typingQueue.length === 0) {
                    clearInterval(check);
                    clearInterval(typingInterval);
                    btn.style.display = "block";
                    stopBtn.style.display = "none";
                }
            }, 100);
        }
    }
    
    function stopAI() {
        if (controller) controller.abort();
        typingQueue = []; // Immediately stop the typewriter
        clearInterval(typingInterval);
        document.getElementById('sendBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
    }
    
    // Helper to switch buttons back
    function resetUI() {
        document.getElementById('sendBtn').style.display = "block";
        document.getElementById('stopBtn').style.display = "none";
    }
    
    document.getElementById("userInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") askAI();
    });
</script>

</body>
</html>
